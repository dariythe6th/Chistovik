<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHISTOVIK — История текстов</title>
    <!-- Подключаем раздельные файлы стилей -->
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/history.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Header (одинаковый для всех страниц) -->
    <header class="header">
        <div class="logo">
            <span class="logo-icon">✍️</span>
            <a href="../index.html" class="logo-link">CHISTOVIK</a>
        </div>
        <nav class="nav">
            <a href="../index.html" class="nav-btn" data-page="workspace">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-6 9 6v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                Главная
            </a>
            <a href="#" class="nav-btn active" data-page="history">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
                История
            </a>
            <button class="nav-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                Профиль
            </button>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="main-container">
        <div class="history-page">
            <div class="history-header">
                <div class="history-title-section">
                    <h1>📚 История текстов</h1>
                    <p class="history-subtitle">Все сохранённые тексты и результаты их анализа</p>
                </div>
                <div class="history-actions">
                    <button id="refreshHistoryBtn" class="action-btn secondary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M23 4v6h-6"/>
                            <path d="M1 20v-6h6"/>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                        </svg>
                        Обновить
                    </button>
                    <button id="clearHistoryBtn" class="action-btn danger">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"/>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                        </svg>
                        Очистить всё
                    </button>
                </div>
            </div>

            <!-- Статистика истории -->
            <div class="history-stats">
                <div class="stat-card-mini">
                    <div class="stat-icon">📄</div>
                    <div class="stat-info">
                        <div class="stat-number" id="totalTextsCount">0</div>
                        <div class="stat-label">всего текстов</div>
                    </div>
                </div>
                <div class="stat-card-mini">
                    <div class="stat-icon">📅</div>
                    <div class="stat-info">
                        <div class="stat-number" id="lastWeekCount">0</div>
                        <div class="stat-label">за последнюю неделю</div>
                    </div>
                </div>
                <div class="stat-card-mini">
                    <div class="stat-icon">📊</div>
                    <div class="stat-info">
                        <div class="stat-number" id="avgReadability">0</div>
                        <div class="stat-label">средняя читаемость</div>
                    </div>
                </div>
            </div>

            <!-- Фильтры -->
            <div class="history-filters">
                <div class="search-box">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <input type="text" id="searchInput" placeholder="Поиск по названию или содержимому...">
                </div>
                <div class="filter-group">
                    <select id="sortSelect" class="filter-select">
                        <option value="date-desc">По дате (сначала новые)</option>
                        <option value="date-asc">По дате (сначала старые)</option>
                        <option value="title-asc">По названию (А-Я)</option>
                        <option value="title-desc">По названию (Я-А)</option>
                    </select>
                </div>
            </div>

            <!-- Список текстов -->
            <div id="historyList" class="history-list">
                <!-- Карточки текстов будут здесь -->
            </div>

            <!-- Пустое состояние -->
            <div id="emptyHistory" class="empty-history" style="display: none;">
                <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#cbd5e0" stroke-width="1">
                    <path d="M4 4v16h16V4H4z"/>
                    <path d="M8 9h8M8 13h6M8 17h4"/>
                </svg>
                <h3>История пуста</h3>
                <p>Сохраните текст на главной странице, и он появится здесь</p>
                <a href="index.html" class="primary-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-6 9 6v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                    Перейти к редактору
                </a>
            </div>
        </div>
    </main>

    <!-- Модальное окно с деталями текста -->
    <div id="textDetailsModal" class="modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3 id="detailsTitle">Детали текста</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="details-content">
                    <div class="details-info">
                        <div class="details-meta">
                            <span class="meta-badge" id="detailsDate"></span>
                            <span class="meta-badge" id="detailsStats"></span>
                        </div>
                        <div class="details-text">
                            <strong>Содержание:</strong>
                            <p id="detailsContent"></p>
                        </div>
                    </div>
                    <div class="details-actions">
                        <button id="openInEditorBtn" class="modal-btn primary">
                            📝 Открыть в редакторе
                        </button>
                        <button id="deleteTextBtn" class="modal-btn danger">
                            🗑️ Удалить
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/history.js"></script>
</body>
</html>
