<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель администратора — CHISTOVIK</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 32px auto;
            background: white;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }
        .admin-header {
            background: var(--gray-800);
            color: white;
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .admin-header h1 {
            color: white;
            font-size: 22px;
        }
        .admin-content {
            padding: 24px 32px;
        }
        .stats-grid-admin {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card-admin {
            background: var(--gray-50);
            padding: 20px;
            border-radius: var(--radius-lg);
            text-align: center;
        }
        .stat-number {
            font-size: 36px;
            font-weight: 700;
            color: var(--primary);
        }
        .users-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .users-table th, .users-table td {
            border: 1px solid var(--gray-200);
            padding: 12px;
            text-align: left;
        }
        .users-table th {
            background: var(--gray-100);
            font-weight: 600;
        }
        .role-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .role-admin {
            background: #fee2e2;
            color: var(--error);
        }
        .role-user {
            background: #e0e7ff;
            color: var(--primary);
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--primary);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>Панель администратора</h1>
            <a href="../index.html" style="color: white; text-decoration: none;">← Вернуться на сайт</a>
        </div>
        <div class="admin-content">
            <div id="adminCheck"></div>
            <div id="stats" class="stats-grid-admin"></div>
            <h3>Пользователи системы</h3>
            <table class="users-table" id="usersTable">
                <thead>
                    <tr><th>ID</th><th>Имя</th><th>Email</th><th>Роль</th><th>Дата регистрации</th></tr>
                </thead>
                <tbody id="usersTbody"></tbody>
            </table>
            <h3 style="margin-top: 32px;">Все тексты пользователей</h3>
            <table class="users-table" id="textsTable">
                <thead><tr><th>ID текста</th><th>Название</th><th>Содержание (превью)</th><th>Дата сохранения</th></tr></thead>
                <tbody id="textsTbody"></tbody>
            </table>
        </div>
    </div>
    <script src="../js/auth.js"></script>
    <script>
        function checkAccess() {
            if (!Auth.isAuthenticated()) {
                window.location.href = 'login.html';
                return false;
            }
            if (!Auth.isAdmin()) {
                document.body.innerHTML = '<div style="text-align:center; margin-top:100px;"><h2>Доступ запрещён</h2><p>У вас нет прав администратора.</p><a href="../index.html">Вернуться на главную</a></div>';
                return false;
            }
            return true;
        }

        function loadAdminData() {
            const users = Auth.getAllUsers();
            const allTexts = JSON.parse(localStorage.getItem('chistovik_history') || '[]');
            
            // Статистика
            const totalUsers = users.length;
            const totalTexts = allTexts.length;
            const avgTextsPerUser = totalUsers ? (totalTexts / totalUsers).toFixed(1) : 0;
            document.getElementById('stats').innerHTML = `
                <div class="stat-card-admin"><div class="stat-number">${totalUsers}</div><div>Пользователей</div></div>
                <div class="stat-card-admin"><div class="stat-number">${totalTexts}</div><div>Всего текстов</div></div>
                <div class="stat-card-admin"><div class="stat-number">${avgTextsPerUser}</div><div>Текстов на пользователя</div></div>
            `;
            
            // Таблица пользователей
            const tbody = document.getElementById('usersTbody');
            tbody.innerHTML = users.map(u => `
                <tr>
                    <td>${u.id}</td>
                    <td>${escapeHtml(u.name)}</td>
                    <td>${escapeHtml(u.email)}</td>
                    <td><span class="role-badge ${u.role === 'admin' ? 'role-admin' : 'role-user'}">${u.role === 'admin' ? 'Администратор' : 'Пользователь'}</span></td>
                    <td>${new Date(u.registered_at).toLocaleString('ru-RU')}</td>
                </tr>
            `).join('');
            
            // Таблица текстов
            const textsTbody = document.getElementById('textsTbody');
            textsTbody.innerHTML = allTexts.map(t => `
                <tr>
                    <td>${t.id}</td>
                    <td>${escapeHtml(t.title || 'Без названия')}</td>
                    <td>${escapeHtml(t.content.substring(0, 100))}${t.content.length > 100 ? '…' : ''}</td>
                    <td>${new Date(t.saved_at).toLocaleString('ru-RU')}</td>
                </tr>
            `).join('');
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        if (checkAccess()) {
            loadAdminData();
        }
    </script>
</body>
</html>
