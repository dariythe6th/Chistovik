<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHISTOVIK — Анализ и коррекция текста</title>
    <!-- Подключаем раздельные файлы стилей -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/editor.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header (одинаковый для всех страниц) -->
    <header class="header">
        <div class="logo">
            <span class="logo-icon">✍️</span>
            <a href="index.html" class="logo-link">CHISTOVIK</a>
        </div>
        <nav class="nav">
            <a href="index.html" class="nav-btn active" data-page="workspace">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-6 9 6v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                Главная
            </a>
            <a href="html/history.html" class="nav-btn" data-page="history">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
                История
            </a>
            <button class="nav-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                Профиль
            </button>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="main-container">
        <!-- Блок выбора функций -->
        <div class="functions-panel">
            <div class="functions-title">Выберите функции для анализа:</div>
            <div class="functions-grid">
                <label class="function-checkbox">
                    <input type="checkbox" id="funcSpelling" value="spelling" checked>
                    <span>Орфографическая проверка</span>
                </label>
                <label class="function-checkbox">
                    <input type="checkbox" id="funcStyle" value="style" checked>
                    <span>Определение стиля текста</span>
                </label>
                <label class="function-checkbox">
                    <input type="checkbox" id="funcWater" value="water">
                    <span>Поиск воды и канцеляризмов</span>
                </label>
                <label class="function-checkbox">
                    <input type="checkbox" id="funcRewrite" value="rewrite">
                    <span>Переработка текста в определённом стиле</span>
                </label>
                <label class="function-checkbox" id="rewriteStyleContainer" style="display: none;">
                    <select id="rewriteStyleSelect" class="rewrite-style-select">
                        <option value="formal">Официально-деловой</option>
                        <option value="journalistic">Публицистический</option>
                        <option value="scientific">Научный</option>
                        <option value="colloquial">Разговорный</option>
                        <option value="literary">Художественный</option>
                    </select>
                </label>
                <label class="function-checkbox">
                    <input type="checkbox" id="funcTone" value="tone">
                    <span>Определение тональности текста</span>
                </label>
                <label class="function-checkbox">
                    <input type="checkbox" id="funcSyntax" value="syntax">
                    <span>Анализ синтаксиса</span>
                </label>
            </div>
        </div>

        <!-- Блок редактора (две колонки при изменении текста) -->
        <div class="editor-wrapper" id="editorWrapper">
            <div class="editor-column original-column" id="originalColumn">
                <div class="editor-container">
                    <textarea id="textInput" placeholder="Введите или вставьте текст для анализа...&#10;&#10;Например:&#10;В настоящее время мы принимаем во внимание тот факт, что ихняя програма работает очень быстро. Данный проект представляет собой комплексную систему, которая включает в себя множество различных модулей, предназначенных для всестороннего анализа текстовой информации с целью повышения качества письменной речи."></textarea>
                </div>
            </div>
            <div class="editor-column modified-column" id="modifiedColumn" style="display: none;">
                <div class="editor-container">
                    <div class="modified-header">
                        <span>Изменённый текст</span>
                        <button id="acceptChangesBtn" class="accept-btn">Применить изменения</button>
                    </div>
                    <textarea id="modifiedInput" readonly placeholder="Здесь появится изменённый текст..."></textarea>
                </div>
            </div>
        </div>

        <!-- Блок кнопок под редактором -->
        <div class="action-buttons">
            <button id="analyzeBtn" class="analyze-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 16v-4M12 8h.01"/>
                </svg>
                Анализировать
            </button>
            <button id="saveBtn" class="save-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                    <polyline points="17 21 17 13 7 13 7 21"/>
                    <polyline points="7 3 7 8 15 8"/>
                </svg>
                Сохранить
            </button>
            <span id="statusIndicator" class="status-indicator"></span>
        </div>

        <!-- Блок результатов анализа (вкладки) -->
        <div class="results-panel">
            <div class="tabs">
                <button class="tab-btn active" data-tab="stats">Статистика</button>
                <button class="tab-btn" data-tab="recommendations">Рекомендации</button>
                <button class="tab-btn" data-tab="results">Результаты анализа</button>
            </div>
            
            <div class="tab-content">
                <!-- Вкладка Статистика -->
                <div id="statsTab" class="tab-pane active">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-label">Длина текста</div>
                            <div class="stat-value" id="charCount">0</div>
                            <div class="stat-sub">символов</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Слова</div>
                            <div class="stat-value" id="wordCount">0</div>
                            <div class="stat-sub">слов</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Предложения</div>
                            <div class="stat-value" id="sentenceCount">0</div>
                            <div class="stat-sub">предложений</div>
                        </div>
                    </div>
                    
                    <div class="stat-card full-width">
                        <div class="stat-label">Индекс читаемости</div>
                        <div class="readability-container">
                            <div class="readability-value" id="readabilityScore">--</div>
                            <div class="readability-bar">
                                <div class="readability-fill" id="readabilityFill" style="width: 0%"></div>
                            </div>
                            <div class="readability-level" id="readabilityLevel">—</div>
                        </div>
                    </div>
                </div>

                <!-- Вкладка Рекомендации -->
                <div id="recommendationsTab" class="tab-pane">
                    <div id="recommendationsList" class="recommendations-list">
                        <div class="empty-state">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#cbd5e0" stroke-width="1.5">
                                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
                            </svg>
                            <p>Нажмите «Анализировать», чтобы получить рекомендации</p>
                        </div>
                    </div>
                </div>

                <!-- Вкладка Результаты анализа -->
                <div id="resultsTab" class="tab-pane">
                    <div id="resultsList" class="results-list">
                        <div class="empty-state">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#cbd5e0" stroke-width="1.5">
                                <circle cx="12" cy="12" r="10"/>
                                <path d="M12 16v-4M12 8h.01"/>
                            </svg>
                            <p>Выберите функции и нажмите «Анализировать»</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Модальное окно сохранения -->
    <div id="saveModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Сохранить текст</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <label for="textTitle">Название текста:</label>
                <input type="text" id="textTitle" placeholder="Например: Курсовая работа - введение" class="modal-input">
            </div>
            <div class="modal-footer">
                <button id="cancelSaveBtn" class="modal-btn secondary">Отмена</button>
                <button id="confirmSaveBtn" class="modal-btn primary">Сохранить</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/components.js"></script>
    <script src="js/app.js"></script>
    <script src="js/styleAnalyzer.js"></script>
</body>
</html>
